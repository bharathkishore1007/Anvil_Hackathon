version: "3.9"

services:
  # ─── Redis: Message Broker + Short-Term Memory ───
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── PostgreSQL + pgvector: Long-Term Memory ───
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: autosre
      POSTGRES_USER: autosre
      POSTGRES_PASSWORD: autosre_secret_2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autosre"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
