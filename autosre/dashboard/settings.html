<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoSRE — Integration Settings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <style>
        :root{--bg-0:#0b0e14;--bg-1:#10141c;--bg-2:#161b26;--bg-3:#1c2233;--bg-4:#232a3b;--border:rgba(255,255,255,0.06);--border-hover:rgba(255,255,255,0.1);--text-1:#e8ecf4;--text-2:#8893a7;--text-3:#515c72;--accent:#63b3ed;--accent-dim:rgba(99,179,237,0.1);--red:#fc8181;--green:#68d391;--amber:#f6ad55;--radius:10px;--radius-sm:6px;--font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font);background:var(--bg-0);color:var(--text-1);min-height:100vh;-webkit-font-smoothing:antialiased}

        .settings-header{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid var(--border);background:var(--bg-1)}
        .settings-header-left{display:flex;align-items:center;gap:16px}
        .back-btn{display:flex;align-items:center;gap:6px;color:var(--text-2);text-decoration:none;font-size:0.82rem;font-weight:500;padding:6px 12px;border-radius:var(--radius-sm);transition:all .2s}
        .back-btn:hover{background:var(--bg-3);color:var(--text-1)}
        .settings-title{font-size:1.2rem;font-weight:700}
        .user-info{display:flex;align-items:center;gap:10px;font-size:0.82rem;color:var(--text-2)}
        .user-avatar{width:32px;height:32px;border-radius:50%;background:var(--accent-dim);display:flex;align-items:center;justify-content:center;color:var(--accent);font-weight:700;font-size:0.85rem}

        .settings-body{max-width:900px;margin:0 auto;padding:28px 32px}
        .section-title{font-size:0.95rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
        .section-desc{font-size:0.78rem;color:var(--text-3);margin-bottom:24px}

        .int-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:16px}
        .int-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;transition:border-color .2s}
        .int-card:hover{border-color:var(--border-hover)}
        .int-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
        .int-card-title{display:flex;align-items:center;gap:10px;font-weight:600;font-size:0.92rem}
        .int-card-icon{font-size:1.3rem}
        .int-badge{font-size:0.65rem;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:0.3px}
        .int-badge.connected{background:rgba(104,211,145,0.12);color:var(--green)}
        .int-badge.not-configured{background:rgba(255,255,255,0.04);color:var(--text-3)}
        .int-badge.testing{background:rgba(99,179,237,0.12);color:var(--accent)}
        .int-badge.error{background:rgba(252,129,129,0.1);color:var(--red)}

        .field-group{margin-bottom:12px}
        .field-group label{display:block;font-size:0.68rem;color:var(--text-3);margin-bottom:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.4px}
        .field-input{width:100%;padding:8px 12px;background:var(--bg-0);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-1);font-family:var(--mono);font-size:0.78rem;outline:none;transition:border-color .2s}
        .field-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(99,179,237,0.08)}
        .field-input::placeholder{color:var(--text-3);font-family:var(--font)}

        .int-card-actions{display:flex;gap:8px;margin-top:14px}
        .btn-test{padding:6px 14px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-2);font-family:var(--font);font-weight:600;font-size:0.72rem;cursor:pointer;transition:all .2s}
        .btn-test:hover{border-color:var(--accent);color:var(--accent)}

        .save-bar{position:fixed;bottom:0;left:0;right:0;padding:14px 32px;background:var(--bg-1);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:12px;z-index:100}
        .btn-save{padding:10px 28px;background:var(--accent);color:var(--bg-0);border:none;border-radius:var(--radius-sm);font-family:var(--font);font-weight:700;font-size:0.85rem;cursor:pointer;transition:all .2s}
        .btn-save:hover{background:#7cc4f0;box-shadow:0 4px 16px rgba(99,179,237,0.3)}
        .btn-save:disabled{opacity:0.5;cursor:not-allowed}
        .save-status{font-size:0.78rem;color:var(--green)}

        .toast-container{position:fixed;bottom:70px;right:20px;z-index:200}
        .toast{padding:10px 16px;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-1);font-size:0.78rem;box-shadow:0 8px 24px rgba(0,0,0,0.3);animation:toastIn .3s ease}
        .toast.success{border-left:3px solid var(--green)}.toast.error{border-left:3px solid var(--red)}
        @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

        @media(max-width:860px){.int-cards{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <header class="settings-header">
        <div class="settings-header-left">
            <a href="/" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Dashboard
            </a>
            <div class="settings-title">Integration Settings</div>
        </div>
        <div class="user-info">
            <span id="userName"></span>
            <div class="user-avatar" id="userAvatar"></div>
        </div>
    </header>

    <div class="settings-body">
        <div class="section-title">🔗 Configure Integrations</div>
        <div class="section-desc">Connect your tools by providing API keys and URLs. All credentials are encrypted with AES-256 before storage.</div>
        <div class="int-cards" id="intCards">
            <div style="text-align:center;color:var(--text-3);padding:60px">Loading integrations…</div>
        </div>
    </div>

    <div class="save-bar">
        <span class="save-status" id="saveStatus"></span>
        <button class="btn-save" id="btnSave" onclick="saveAll()">Save All Settings</button>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const TOKEN = localStorage.getItem('autosre_token');
        if (!TOKEN) window.location.href = '/login';

        const user = JSON.parse(localStorage.getItem('autosre_user') || '{}');
        document.getElementById('userName').textContent = user.name || user.email || '';
        document.getElementById('userAvatar').textContent = (user.name || 'U')[0].toUpperCase();

        const headers = () => ({'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json'});
        let schema = {};
        let currentValues = {};

        async function init() {
            try {
                const [schemaRes, valuesRes] = await Promise.all([
                    fetch('/settings/schema', {headers: headers()}),
                    fetch('/settings/integrations', {headers: headers()}),
                ]);
                const schemaData = await schemaRes.json();
                const valuesData = await valuesRes.json();
                schema = schemaData.integrations;
                currentValues = valuesData.integrations || {};
                renderCards();
            } catch (e) {
                document.getElementById('intCards').innerHTML = '<div style="color:var(--red)">Failed to load settings</div>';
            }
        }

        function renderCards() {
            const container = document.getElementById('intCards');
            container.innerHTML = '';
            for (const [intId, intSchema] of Object.entries(schema)) {
                const vals = currentValues[intId] || {};
                const configured = vals.configured;
                const card = document.createElement('div');
                card.className = 'int-card';
                card.id = `card-${intId}`;

                let fieldsHtml = '';
                for (const field of intSchema.fields) {
                    const val = vals.fields?.[field.key] || '';
                    fieldsHtml += `
                        <div class="field-group">
                            <label>${field.label}</label>
                            <input type="${field.type === 'password' ? 'password' : 'text'}" 
                                   class="field-input" 
                                   data-integration="${intId}" 
                                   data-key="${field.key}"
                                   placeholder="${field.placeholder}"
                                   value="${val}">
                        </div>`;
                }

                card.innerHTML = `
                    <div class="int-card-header">
                        <div class="int-card-title">
                            <span class="int-card-icon">${intSchema.icon}</span>
                            ${intSchema.label}
                        </div>
                        <span class="int-badge ${configured ? 'connected' : 'not-configured'}" id="badge-${intId}">
                            ${configured ? '● Connected' : '○ Not configured'}
                        </span>
                    </div>
                    ${fieldsHtml}
                    <div class="int-card-actions">
                        <button class="btn-test" onclick="testConnection('${intId}')">Test Connection</button>
                    </div>
                `;
                container.appendChild(card);
            }
        }

        async function testConnection(intId) {
            const badge = document.getElementById(`badge-${intId}`);
            badge.className = 'int-badge testing';
            badge.textContent = '⏳ Testing…';
            try {
                const res = await fetch(`/settings/integrations/test/${intId}`, {
                    method: 'POST', headers: headers(),
                });
                const data = await res.json();
                if (data.status === 'connected') {
                    badge.className = 'int-badge connected';
                    badge.textContent = '● Connected';
                    showToast(`${intId} connected successfully!`, 'success');
                } else if (data.status === 'not_configured') {
                    badge.className = 'int-badge not-configured';
                    badge.textContent = '○ Not configured';
                    showToast(`Save settings first, then test`, 'error');
                } else {
                    badge.className = 'int-badge error';
                    badge.textContent = '✕ Error';
                    showToast(`${intId}: ${data.message || 'Connection failed'}`, 'error');
                }
            } catch (e) {
                badge.className = 'int-badge error';
                badge.textContent = '✕ Error';
            }
        }

        async function saveAll() {
            const btn = document.getElementById('btnSave');
            btn.disabled = true; btn.textContent = 'Saving…';

            const integrations = {};
            document.querySelectorAll('.field-input').forEach(input => {
                const intId = input.dataset.integration;
                const key = input.dataset.key;
                if (!integrations[intId]) integrations[intId] = {};
                integrations[intId][key] = input.value;
            });

            try {
                const res = await fetch('/settings/integrations', {
                    method: 'PUT',
                    headers: headers(),
                    body: JSON.stringify({integrations}),
                });
                const data = await res.json();
                document.getElementById('saveStatus').textContent = `✓ ${data.saved} settings saved`;
                showToast(`Saved ${data.saved} settings`, 'success');
                setTimeout(() => init(), 500); // Reload to see updated badges
            } catch (e) {
                showToast('Failed to save', 'error');
            } finally {
                btn.disabled = false; btn.textContent = 'Save All Settings';
            }
        }

        function showToast(msg, type) {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast ${type}`; t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(), 300); }, 3000);
        }

        init();
    </script>
</body>
</html>
