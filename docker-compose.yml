version: "3.8"

services:
  redis:
    image: redis:7-alpine
    container_name: autosre-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: autosre-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: autosre
      POSTGRES_USER: autosre
      POSTGRES_PASSWORD: autosre_secret_2026
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autosre -d autosre"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
  postgres_data:
